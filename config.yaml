model: large-v3
language: auto
translator: whisper
gpu: true
data_dir: data

# audio
audio_filter: true   # loudness normalisation + speech bandpass (200–3000 Hz)

# transcription
beam_size: 0         # 0 = use whisper internal default (no override); higher values increase hallucination risk
vad: false           # voice activity detection — requires a separate silero VAD model file
prompt: "hebrew to english"           # optional initial prompt to guide whisper (e.g. domain vocabulary)

# post-processing
clean: false          # strip hallucination artifacts ([Music], ♪, repeated phrases)
merge_gap: 1s        # merge consecutive segments with gap ≤ this value
merge_chars: 80      # max characters per merged segment
split_chars: 80      # split segments longer than this (0 = disabled)
fix_overlaps: true   # trim segment end times that overlap the next segment

openai:
  base_url: http://localhost:1234/v1
  api_key: ""
  model: gpt-4o-mini
