# Model to use. Valid short names: tiny, base, small, medium, large-v3, ivrit-ai/whisper-large-v3-ggml.
# 'ivrit-ai/whisper-large-v3-ggml' is an optimized model from ivrit-ai.
# You can also provide an absolute path to a local .bin (GGML/GGUF) file.
#model: large-v3
model: ivrit-ai/whisper-large-v3-ggml

whisper_models:
  ivrit-ai/whisper-large-v3-ggml: "https://huggingface.co/ivrit-ai/whisper-large-v3-ggml/resolve/main/ggml-model.bin"

language: auto
gpu: true
data_dir: data

# audio
audio_filter: true   # loudness normalisation + speech bandpass (200–3000 Hz)

# transcription
beam_size: 0         # 0 = use whisper internal default (no override); higher values increase hallucination risk
chunk_size: 300      # size of transcription chunks in seconds (0 = disabled, process fully)
vad: false           # voice activity detection — requires a separate silero VAD model file
prompt: "hebrew to english"           # optional initial prompt to guide whisper (e.g. domain vocabulary)

# post-processing
clean: false          # strip hallucination artifacts ([Music], ♪, repeated phrases)
merge_gap: 1s        # merge consecutive segments with gap ≤ this value
merge_chars: 80      # max characters per merged segment
split_chars: 80      # split segments longer than this (0 = disabled)
fix_overlaps: true   # trim segment end times that overlap the next segment


llm_refine:
  enabled: true

  # backend selects which local LLM server to use.
  # Supported values:
  #   ollama    — Ollama (CPU only unless ROCm installed). Default URL: http://localhost:11434/v1
  #   llamacpp  — llama.cpp server with Vulkan GPU. Default URL: http://localhost:8080/v1
  #               Run: scripts/setup-llamacpp.sh  to build and start it.
  backend: "llamacpp"

  # Override the auto-detected URL/key/model if you need a custom endpoint
  # (e.g. a hosted OpenAI-compatible API).  Leave empty to use backend defaults.
  base_url: ""
  api_key:  ""
  model:    ""

  chunk_size: 40      # Number of subtitles to process per LLM request
  prompt: "You are an expert translator and subtitle editor. Translate the following subtitles from {{.SourceLang}} to natural, idiomatic English, while strictly preserving the nuanced context and intended meaning of the source language. Fix spelling and grammar, join short phrases that naturally belong on the same line if possible, adjusting the timestamps accordingly. Do not invent new content, emit chat dialogue, or change the original meaning. Return ONLY the fixed lines in valid SRT format, with no surrounding formatting or code block artifacts."
